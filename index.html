<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Milano Live Heat Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.card {
    background:#1e293b;
    margin:20px auto;
    padding:20px;
    width:300px;
    border-radius:16px;
}
.big {
    font-size:48px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🌡 MILANO LIVE DASHBOARD</h1>

<div class="card">
<h2>ARPA</h2>
<div id="arpa" class="big">...</div>
</div>

<div class="card">
<h2>Risk</h2>
<div id="risk" class="big">...</div>
</div>

<script>

// 🔴 LIVE FETCH
async function loadData() {
    const res = await fetch("data.json?v=" + new Date().getTime());
    const data = await res.json();

    document.getElementById("arpa").innerText = data.arpa + "°C";
    document.getElementById("risk").innerText = "Level " + data.ministero;
}

loadData();
setInterval(loadData, 60000); // 🔥 her 60 saniyede update
</script>

</body>
</html>
