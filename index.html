
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Milano Heat Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.header {
    text-align: center;
    padding: 25px;
    background: #111827;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
}

.big {
    font-size: 48px;
    font-weight: bold;
}

.chart {
    grid-column: 1 / span 2;
}
</style>
</head>

<body>

<div class="header">
🌡 MILANO HEAT DASHBOARD<br>
2026-06-16
</div>

<div class="grid">

<div class="card">
<h2>ARPA Lombardia (Live)</h2>
<div class="big">37.0°C</div>
</div>

<div class="card">
<h2>Ministero Risk Level</h2>
<div class="big">Level 3</div>
</div>

<div class="card chart">
<canvas id="chart"></canvas>
</div>

</div>

<script>
const labels = ["10 Jun", "11 Jun", "12 Jun", "13 Jun", "14 Jun", "15 Jun", "16 Jun"];

new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [
            {
                label: "Temperature",
                data: [36, 35, 34, 33, 32, 31, 30],
                borderColor: "red",
                tension: 0.3
            },
            {
                label: "Risk Level",
                data: [3, 3, 3, 2, 2, 1, 1],
                borderColor: "orange",
                tension: 0.3
            }
        ]
    }
});
</script>

</body>
</html>
